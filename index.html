<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Typing Speed Test Pro</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <h1>⌨ Typing Speed Test</h1>

        <div class="stats">

            <div class="box">
                <h2 id="timer">60</h2>
                <p>Seconds</p>
            </div>

            <div class="box">
                <h2 id="wpm">0</h2>
                <p>WPM</p>
            </div>

            <div class="box">
                <h2 id="cpm">0</h2>
                <p>CPM</p>
            </div>

            <div class="box">
                <h2 id="accuracy">100%</h2>
                <p>Accuracy</p>
            </div>

            <div class="box">
                <h2 id="mistakes">0</h2>
                <p>Mistakes</p>
            </div>

        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="paragraph" id="paragraph">
            Loading...
        </div>

        <textarea id="input" placeholder="Start typing here..." autocomplete="off"></textarea>

        <button id="restart">
            Restart Test
        </button>

    </div>

    <!-- AUDIO -->

    <audio id="typeSound">
        <source src="sounds/type.mp3" type="audio/mpeg">
    </audio>

    <audio id="correctSound">
        <source src="sounds/correct.mp3" type="audio/mpeg">
    </audio>

    <audio id="wrongSound">
        <source src="sounds/wrong.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
